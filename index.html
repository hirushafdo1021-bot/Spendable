<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Spendable</title>
<meta name="theme-color" content="#13101B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spendable">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%2313101B'/><circle cx='90' cy='90' r='52' fill='none' stroke='%23262031' stroke-width='14'/><circle cx='90' cy='90' r='52' fill='none' stroke='%2367E8C3' stroke-width='14' stroke-linecap='round' stroke-dasharray='245 327' transform='rotate(-90 90 90)'/><text x='90' y='104' font-family='Georgia,serif' font-style='italic' font-size='52' fill='%23F5F2F8' text-anchor='middle'>s</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-0:#13101B; --bg-1:#1E1730;
    --surface:#1C1626; --surface-2:#262031; --surface-3:#2E2740;
    --line:rgba(255,255,255,.07); --line-strong:rgba(255,255,255,.14);
    --mint:#67E8C3; --mint-soft:#A6F2DC; --mint-dim:#3aa988;
    --coral:#FF7E6E; --gold:#F3C98B;
    --text:#F5F2F8; --muted:#A39AB4; --muted-2:#6B6380;
    --display:'Fraunces',Georgia,serif;
    --num:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--body);color:var(--text);
    background:
      radial-gradient(130% 60% at 50% -8%, #312248 0%, rgba(49,34,72,0) 58%),
      radial-gradient(90% 50% at 100% 100%, rgba(103,232,195,.06), transparent 60%),
      linear-gradient(180deg,var(--bg-0) 0%, var(--bg-1) 100%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;letter-spacing:.1px;
  }
  .app{max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:0 17px 104px}

  header{display:flex;align-items:center;justify-content:space-between;padding:24px 2px 6px}
  .brand{font-family:var(--display);font-style:italic;font-size:24px;letter-spacing:.2px}
  .brand b{color:var(--mint);font-weight:500;font-style:italic}
  .gear{width:39px;height:39px;border-radius:13px;border:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,255,255,.04),transparent),var(--surface);
    display:grid;place-items:center;color:var(--muted);cursor:pointer;transition:transform .12s,color .2s}
  .gear:active{transform:scale(.92)}
  .datestrip{font-size:12.5px;color:var(--muted);padding:2px 3px 4px;display:flex;gap:8px;align-items:center}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 2.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(103,232,195,.5)}70%{box-shadow:0 0 0 7px rgba(103,232,195,0)}100%{box-shadow:0 0 0 0 rgba(103,232,195,0)}}

  /* hero */
  .hero{position:relative;display:grid;place-items:center;padding:12px 0 2px}
  .ring-wrap{position:relative;width:256px;height:256px;display:grid;place-items:center}
  .glow{position:absolute;inset:34px;border-radius:50%;background:radial-gradient(circle,rgba(103,232,195,.20),transparent 66%);filter:blur(8px)}
  .glow.over{background:radial-gradient(circle,rgba(255,126,110,.20),transparent 66%)}
  svg.ring{position:absolute;inset:0;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:11}
  .ring-prog{fill:none;stroke-width:11;stroke-linecap:round;
    transition:stroke-dashoffset .85s cubic-bezier(.22,1,.36,.1),stroke .4s}
  .ring-center{position:relative;text-align:center;z-index:2}
  .ring-center .lbl{font-family:var(--display);font-style:italic;font-size:14px;color:var(--muted);margin-bottom:5px}
  .ring-center .amt{font-family:var(--num);font-weight:600;font-size:43px;letter-spacing:-1.5px;line-height:1;font-variant-numeric:tabular-nums}
  .ring-center .amt .cur{font-size:18px;color:var(--muted);font-weight:500;margin-right:3px}
  .ring-center .amt.over{color:var(--coral)}
  .ring-center .sub{font-size:11.5px;color:var(--muted-2);margin-top:9px;font-family:var(--num)}

  .log-btn{margin:8px auto 2px;display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;max-width:250px;padding:15px;border-radius:15px;border:none;cursor:pointer;
    background:linear-gradient(180deg,var(--mint-soft),var(--mint));color:#08231b;font-weight:700;font-size:15px;font-family:var(--body);
    box-shadow:0 10px 26px -10px rgba(103,232,195,.55);transition:transform .12s}
  .log-btn:active{transform:scale(.97)}

  /* metric strip */
  .metrics{display:grid;grid-template-columns:1.15fr 1fr 1fr;margin-top:16px;
    background:linear-gradient(180deg,rgba(255,255,255,.035),transparent 42%),var(--surface);
    border:1px solid var(--line);border-radius:20px;overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 20px 44px -30px rgba(0,0,0,.85)}
  .metric{padding:15px 13px;position:relative}
  .metric+.metric{border-left:1px solid var(--line)}
  .metric .mk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
  .metric .mk svg{width:12px;height:12px;opacity:.7}
  .metric .mv{font-family:var(--num);font-weight:600;font-variant-numeric:tabular-nums;margin-top:7px;line-height:1.05}
  .metric.cash .mv{font-size:21px;color:var(--gold)}
  .metric.limit .mv{font-size:19px;color:var(--mint)}
  .metric.days .mv{font-size:19px}
  .metric .mv small{font-size:11px;color:var(--muted-2);font-weight:500;margin-left:2px}
  .metric.cash .mv.neg{color:var(--coral)}
  .metric .msub{font-size:9.5px;color:var(--muted-2);margin-top:3px;font-family:var(--body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* cards */
  .card{background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 38%),var(--surface);
    border:1px solid var(--line);border-radius:20px;padding:17px 17px;margin-top:13px;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 18px 40px -30px rgba(0,0,0,.8)}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .ttl{display:flex;align-items:center;gap:9px}
  .chip{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;background:var(--surface-3);color:var(--mint)}
  .chip svg{width:14px;height:14px}
  .chip.gold{color:var(--gold)} .chip.coral{color:var(--coral)}
  .card-head h3{margin:0;font-size:12.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
  .head-amt{font-family:var(--num);font-weight:600;font-size:15px;font-variant-numeric:tabular-nums}
  .head-amt.gold{color:var(--gold)} .head-amt.coral{color:var(--coral)}

  .add-line{display:flex;align-items:center;gap:6px;color:var(--mint);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;font-family:var(--body);padding:11px 0 2px;width:100%;justify-content:center;border-top:1px solid var(--line);margin-top:4px}
  .add-line:active{opacity:.6}

  .rowi{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .rowi:first-of-type{border-top:none}
  .rowi .meta{flex:1;min-width:0}
  .rowi .nm{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rowi .amt{font-family:var(--num);font-size:12px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .rowi .val{font-family:var(--num);font-weight:600;font-size:14.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .rowi.settled .nm{color:var(--muted-2);text-decoration:line-through}
  .rowi.salary{cursor:pointer}
  .rowi.salary .nm small{color:var(--muted-2);font-weight:400;font-size:11px;margin-left:6px}
  .meta.editable{cursor:pointer;border-radius:9px;margin:-4px -6px;padding:4px 6px;transition:background .15s}
  .meta.editable:active{background:rgba(255,255,255,.05)}
  .pencil{width:12px;height:12px;opacity:.4;vertical-align:middle;margin-left:2px}
  .export-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
  .export-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;cursor:pointer;
    font-family:var(--body);font-weight:600;font-size:14px;border:1px solid var(--line-strong);background:var(--bg-0);color:var(--text);transition:transform .12s,border-color .2s}
  .export-btn:active{transform:scale(.97)}
  .export-btn svg{width:17px;height:17px;color:var(--mint)}
  .install-banner{display:flex;align-items:center;gap:11px;margin-top:14px;padding:12px 13px;border-radius:16px;
    background:linear-gradient(180deg,rgba(103,232,195,.11),rgba(103,232,195,.03));border:1px solid rgba(103,232,195,.24)}
  .install-banner .ib-ic{width:34px;height:34px;border-radius:10px;background:rgba(103,232,195,.16);display:grid;place-items:center;color:var(--mint);flex-shrink:0}
  .install-banner .ib-ic svg{width:18px;height:18px}
  .install-banner .ib-t{flex:1;min-width:0}
  .install-banner .ib-t b{font-size:13.5px;font-weight:600;display:block}
  .install-banner .ib-t span{font-size:11.5px;color:var(--muted)}
  .install-banner .ib-go{padding:9px 13px;border-radius:11px;border:none;background:linear-gradient(180deg,var(--mint-soft),var(--mint));color:#08231b;font-weight:700;font-size:12.5px;font-family:var(--body);cursor:pointer}
  .install-banner .ib-x{width:26px;height:26px;border:none;background:none;color:var(--muted-2);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}
  .steps{margin:0 0 16px;padding:0;list-style:none;counter-reset:s}
  .steps li{position:relative;padding:10px 0 10px 38px;border-top:1px solid var(--line);font-size:13.5px;line-height:1.5;color:var(--text)}
  .steps li:first-child{border-top:none}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:9px;width:24px;height:24px;border-radius:8px;background:var(--surface-3);color:var(--mint);font-family:var(--num);font-weight:600;font-size:12px;display:grid;place-items:center}
  .steps li b{color:var(--text)}
  .gtab{display:flex;gap:8px;margin-bottom:16px}
  .gtab button{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line-strong);background:var(--bg-0);color:var(--muted);font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .gtab button svg{width:16px;height:16px}
  .gtab button.sel{border-color:var(--mint);background:rgba(103,232,195,.12);color:var(--mint)}
  .gnote{font-size:12px;color:var(--muted);line-height:1.55;background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .gnote b{color:var(--gold)}
  .settle{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line-strong);background:transparent;color:var(--text);font-family:var(--body);transition:transform .12s}
  .settle:active{transform:scale(.93)}
  .settle.done{background:rgba(103,232,195,.14);border-color:rgba(103,232,195,.35);color:var(--mint)}
  .rm{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--muted-2);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}
  .rm:active{color:var(--coral)}
  .tag-in{color:var(--mint)} .tag-out{color:var(--coral)}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:12px 4px;line-height:1.55}

  /* stats */
  .big-num{font-family:var(--num);font-weight:600;font-size:31px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .progbar{height:9px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:11px}
  .progbar > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--mint-dim),var(--mint));transition:width .85s cubic-bezier(.22,1,.36,1)}
  .progbar.over > i{background:var(--coral)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:13px}
  .sbox{background:linear-gradient(180deg,rgba(255,255,255,.03),transparent),var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 14px}
  .sbox .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .sbox .v{font-family:var(--num);font-weight:600;font-size:18px;margin-top:6px;font-variant-numeric:tabular-nums}
  .legend{display:flex;gap:15px;font-size:11px;color:var(--muted);margin-top:13px;flex-wrap:wrap}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .bar-spent{background:var(--mint)}.bar-today{background:var(--gold)}.line-ideal{border-bottom:2px dashed var(--coral);width:14px;height:0;border-radius:0}

  /* tabs */
  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:30}
  .tabs-inner{max-width:430px;margin:0 auto;display:flex;background:rgba(20,16,28,.9);backdrop-filter:blur(16px);
    border-top:1px solid var(--line);padding:9px 18px calc(9px + env(safe-area-inset-bottom))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px;border:none;background:none;
    color:var(--muted-2);font-family:var(--body);font-size:11px;font-weight:600;cursor:pointer;transition:color .2s}
  .tab.active{color:var(--mint)}
  .tab svg{width:21px;height:21px}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(8,6,12,.62);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:430px;margin:0 auto;
    background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 30%),var(--surface);
    border-radius:28px 28px 0 0;border:1px solid var(--line);border-bottom:none;
    padding:10px 22px calc(28px + env(safe-area-inset-bottom));transform:translateY(110%);
    transition:transform .34s cubic-bezier(.22,1,.36,1);box-shadow:0 -20px 60px -20px rgba(0,0,0,.7)}
  .sheet.open{transform:translateY(0)}
  .grab{width:42px;height:4px;border-radius:3px;background:var(--line-strong);margin:6px auto 18px}
  .sheet h2{font-family:var(--display);font-weight:500;font-size:22px;margin:0 0 4px}
  .sheet .hint{font-size:12.5px;color:var(--muted);margin:0 0 18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;letter-spacing:.2px}
  .input{width:100%;padding:14px;border-radius:13px;border:1px solid var(--line-strong);background:var(--bg-0);
    color:var(--text);font-size:16px;font-family:var(--num);font-variant-numeric:tabular-nums;outline:none;transition:border-color .2s}
  .input::placeholder{color:var(--muted-2);font-family:var(--body)}
  .input:focus{border-color:var(--mint)}
  input.input[type=text]{font-family:var(--body)}
  .with-cur{position:relative}
  .with-cur .pfx{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-family:var(--num);font-size:15px}
  .with-cur .input{padding-left:42px}
  .cur-pick{display:flex;gap:8px;flex-wrap:wrap}
  .cur-pick button{padding:9px 14px;border-radius:11px;border:1px solid var(--line-strong);background:var(--bg-0);color:var(--text);font-family:var(--num);font-size:14px;cursor:pointer}
  .cur-pick button.sel{border-color:var(--mint);background:rgba(103,232,195,.12);color:var(--mint)}
  .gfilter{margin:2px 0 12px}
  .gfilter button{padding:7px 12px;font-size:12.5px}
  .grp-list{display:flex;flex-direction:column;gap:8px}
  .grp{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--bg-0)}
  .grp.open{border-color:var(--line-strong)}
  .grp-head{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;background:none;border:none;color:var(--text);cursor:pointer;text-align:left}
  .gh-name{flex:1;font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gh-qty{font-family:var(--num);font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:8px;padding:3px 8px}
  .gh-amt{font-family:var(--num);font-weight:600;font-size:14.5px;font-variant-numeric:tabular-nums}
  .gh-caret{width:18px;height:18px;color:var(--muted);transition:transform .2s ease;flex-shrink:0}
  .grp.open .gh-caret{transform:rotate(180deg)}
  .grp-body{padding:2px 14px 10px;border-top:1px solid var(--line)}
  .grp-day{display:flex;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
  .grp-day:first-child{border-top:none}
  .gd-date{flex:1;color:var(--text)}
  .gd-qty{width:64px;text-align:center;font-family:var(--num);color:var(--muted)}
  .gd-amt{width:96px;text-align:right;font-family:var(--num);font-weight:600;font-variant-numeric:tabular-nums}
  .grp-colhead{font-size:10.5px;letter-spacing:.4px;color:var(--muted);text-transform:uppercase}
  .grp-colhead .gd-date,.grp-colhead .gd-qty,.grp-colhead .gd-amt{color:var(--muted);font-weight:500}
  .grp-foot{font-weight:600;color:var(--mint)}
  .grp-foot .gd-qty{color:var(--mint)}
  .sheet-btn{width:100%;padding:16px;border-radius:15px;border:none;font-weight:700;font-size:15px;font-family:var(--body);cursor:pointer;margin-top:6px;transition:transform .12s;
    background:linear-gradient(180deg,var(--mint-soft),var(--mint));color:#08231b}
  .sheet-btn:active{transform:scale(.98)}
  .sheet-btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line-strong);font-weight:600;margin-top:10px}
  .sheet-btn.danger{background:rgba(255,126,110,.14);color:var(--coral);border:1px solid rgba(255,126,110,.3);font-weight:600}
  .seg{display:flex;gap:8px;margin-bottom:14px}
  .seg button{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line-strong);background:var(--bg-0);color:var(--muted);font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer}
  .seg button.sel{border-color:var(--mint);background:rgba(103,232,195,.12);color:var(--mint)}
  .payinfo{background:var(--surface-2);border-radius:13px;padding:13px 15px;margin-bottom:16px;font-size:12.5px;color:var(--muted);line-height:1.5}
  .payinfo b{color:var(--text)}

  .fade{animation:fade .45s ease both}
  .stagger > *{animation:rise .5s cubic-bezier(.22,1,.36,1) both}
  .stagger > *:nth-child(1){animation-delay:.02s}.stagger > *:nth-child(2){animation-delay:.07s}
  .stagger > *:nth-child(3){animation-delay:.12s}.stagger > *:nth-child(4){animation-delay:.17s}
  .stagger > *:nth-child(5){animation-delay:.22s}.stagger > *:nth-child(6){animation-delay:.27s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="app">
  <header>
    <div class="brand">spend<b>able</b></div>
    <button class="gear" id="gearBtn" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>
  <div id="view"></div>
</div>

<div class="tabs"><div class="tabs-inner">
  <button class="tab active" id="tabToday">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>Today</button>
  <button class="tab" id="tabStats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7" rx="1"/><rect x="12" y="7" width="3" height="11" rx="1"/><rect x="17" y="14" width="3" height="4" rx="1"/></svg>Stats</button>
</div></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
/* ---------- state ---------- */
const KEY='budget-data';
let state={ salary:0, currency:'Rs', payments:[], incomes:[], spending:[], salaryByCycle:{}, cycleAck:null, installDismissed:false };
let activeTab='today', lastBudget=null, paydayDismissed=false, grpFilter='all', grpOpen={};

async function loadState(){
  try{ const v=localStorage.getItem(KEY); if(v){ const d=JSON.parse(v); state={...state,...d}; if(!state.incomes)state.incomes=[]; } }catch(e){}
  // migrate: every fixed payment now tracks how much has actually been paid toward it
  (state.payments||[]).forEach(p=>{ if(p.paid===undefined||p.paid===null){ p.paid = p.settled ? (+p.amount||0) : 0; } p.paid=+p.paid||0; });
  // migrate: per-cycle salary tracking. Existing users are acknowledged for the current cycle so they aren't prompted retroactively.
  if(!state.salaryByCycle) state.salaryByCycle={};
  if(state.salary>0 && !state.cycleAck){ const k=cycleKey(); state.cycleAck=k; if(state.salaryByCycle[k]===undefined) state.salaryByCycle[k]=state.salary; }
}
async function saveState(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ console.error(e); } }

/* ---------- date / payday logic ---------- */
const uid=()=>Math.random().toString(36).slice(2,10);
const mid=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());
const dKey=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const todayKey=()=>dKey(new Date());
const parseK=s=>mid(new Date(s+'T00:00:00'));
const between=(a,b)=>Math.round((mid(b)-mid(a))/86400000);

function paydayFor(y,m){ // m can overflow/underflow; salary on 25th, Fri if weekend
  const d=new Date(y,m,25); const w=d.getDay();
  if(w===6) d.setDate(24); else if(w===0) d.setDate(23);
  return mid(d);
}
function getCycle(now){
  now=mid(now);
  const tp=paydayFor(now.getFullYear(),now.getMonth());
  if(now>=tp) return {prev:tp, next:paydayFor(now.getFullYear(),now.getMonth()+1)};
  return {prev:paydayFor(now.getFullYear(),now.getMonth()-1), next:tp};
}
const inCycle=(ds,c)=>{ const d=parseK(ds); return d>=c.prev && d<c.next; };
// stable key for the current pay cycle (its start / payday date)
const cycleKey=(now)=>dKey(getCycle(now||new Date()).prev);

// normalised key used to group payments that share a name (case/space-insensitive)
const groupKey=n=>(n||'Payment').trim().toLowerCase().replace(/\s+/g,' ');

// distinct past payment names, most-used first — used to suggest names while logging
function suggestNames(limit){
  const count={}, label={};
  state.spending.forEach(e=>{ const n=(e.note||'').trim(); if(!n) return; const k=groupKey(n);
    count[k]=(count[k]||0)+1; if(!label[k]) label[k]=n; });
  return Object.keys(count).sort((a,b)=>count[b]-count[a]).map(k=>label[k]).slice(0,limit||8);
}

// group this cycle's daily payments by name → totals, counts, and per-day breakdown
function groupSpend(entries){
  const g={};
  entries.forEach(e=>{ const k=groupKey(e.note||'Payment');
    if(!g[k]) g[k]={key:k,name:(e.note||'').trim()||'Payment',total:0,count:0,items:[]};
    g[k].total+=(+e.amount||0); g[k].count++; g[k].items.push(e); });
  const groups=Object.values(g);
  groups.forEach(gr=>{
    gr.items.sort((a,b)=>(b.ts||0)-(a.ts||0));
    const byDay={};
    gr.items.forEach(e=>{ if(!byDay[e.date]) byDay[e.date]={date:e.date,count:0,total:0,ts:e.ts||0};
      byDay[e.date].count++; byDay[e.date].total+=(+e.amount||0); byDay[e.date].ts=Math.max(byDay[e.date].ts,e.ts||0); });
    gr.days=Object.values(byDay).sort((a,b)=>parseK(b.date)-parseK(a.date));
  });
  return groups.sort((a,b)=>b.total-a.total);
}

/* ---------- compute ---------- */
function compute(){
  const now=new Date(); const c=getCycle(now);
  const cycleLen=Math.max(between(c.prev,c.next),1);
  const daysLeft=Math.max(between(mid(now),c.next),1);
  const extra=state.incomes.filter(i=>inCycle(i.date,c)).reduce((s,i)=>s+(+i.amount||0),0);
  const totalIncome=state.salary+extra;
  const totalFixed=state.payments.reduce((s,p)=>s+(+p.amount||0),0);
  const paidFixed=state.payments.reduce((s,p)=>s+(+p.paid||0),0);
  const overpaidFixed=state.payments.reduce((s,p)=>s+Math.max(0,(+p.paid||0)-(+p.amount||0)),0);
  const pendingFixed=state.payments.reduce((s,p)=>s+Math.max(0,(+p.amount||0)-(+p.paid||0)),0);
  // money set aside for fixed bills = the bigger of what's allocated or what's actually been paid (overpay eats into livable income)
  const reservedFixed=totalFixed+overpaidFixed;
  const settledFixed=paidFixed; // back-compat alias
  const cspend=state.spending.filter(s=>inCycle(s.date,c));
  const spentCycle=cspend.reduce((s,e)=>s+(+e.amount||0),0);
  const tk=todayKey();
  const spentToday=cspend.filter(e=>e.date===tk).reduce((s,e)=>s+(+e.amount||0),0);
  const spentBefore=cspend.filter(e=>parseK(e.date)<mid(now)).reduce((s,e)=>s+(+e.amount||0),0);
  const available=totalIncome-reservedFixed;
  const cashInHand=totalIncome-paidFixed-spentCycle;
  const dailyLimit=(available-spentBefore)/daysLeft;
  const todaySpendable=dailyLimit-spentToday;
  const idealDaily=available/cycleLen;
  const remainingCycle=available-spentCycle;
  return {c,cycleLen,daysLeft,extra,totalIncome,totalFixed,paidFixed,overpaidFixed,pendingFixed,reservedFixed,settledFixed,cspend,spentCycle,
    spentToday,available,cashInHand,dailyLimit,todaySpendable,idealDaily,remainingCycle};
}

/* ---------- format ---------- */
function fmt(n){ const neg=n<0; n=Math.round(Math.abs(n)); return (neg?'-':'')+state.currency+' '+n.toLocaleString('en-US'); }
function fmtShort(n){ const neg=n<0; n=Math.round(Math.abs(n)); const s=Math.abs(n)>=10000?(n/1000).toFixed(n%1000?1:0)+'k':n.toLocaleString('en-US'); return (neg?'-':'')+state.currency+' '+s; }
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function payStr(d){ return d.toLocaleDateString(undefined,{day:'numeric',month:'short'}); }

/* ---------- views ---------- */
function render(){
  document.getElementById('tabToday').classList.toggle('active',activeTab==='today');
  document.getElementById('tabStats').classList.toggle('active',activeTab==='stats');
  const v=document.getElementById('view');
  v.innerHTML = activeTab==='today'? todayView(): statsView();
  if(activeTab==='today') wireToday(); else wireStats();
  refreshDate();
}
function refreshDate(){
  const el=document.querySelector('.datestrip .txt');
  if(el){ const c=compute();
    el.textContent=new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})
      +' · '+c.daysLeft+' day'+(c.daysLeft!==1?'s':'')+' to payday'; }
}

function todayView(){
  const c=compute(), noSalary=!state.salary;
  const allowance=c.dailyLimit, over=c.todaySpendable<0;
  const frac=allowance>0?Math.min(c.spentToday/allowance,1):(c.spentToday>0?1:0);
  const C=534.07, offset=C*(1-frac);
  const ring= over?'var(--coral)': frac>.85?'var(--gold)':'url(#mg)';
  const todays=c.cspend.filter(e=>e.date===todayKey()).slice().reverse();
  const cycleIncomes=state.incomes.filter(i=>inCycle(i.date,c.c)).slice().reverse();

  return `
  ${(!isStandalone && !state.installDismissed)? `
  <div class="install-banner">
    <div class="ib-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M12 18h.01"/></svg></div>
    <div class="ib-t"><b>Add to your home screen</b><span>Open it like a real app — no Claude needed</span></div>
    <button class="ib-go" id="ibGo">How</button>
    <button class="ib-x" id="ibX" aria-label="Dismiss">×</button>
  </div>`:''}

  <div class="datestrip"><span class="dot"></span><span class="txt"></span></div>

  <div class="hero">
    <div class="ring-wrap">
      <div class="glow ${over?'over':''}"></div>
      <svg class="ring" viewBox="0 0 200 200">
        <defs><linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="var(--mint-soft)"/><stop offset="1" stop-color="var(--mint-dim)"/></linearGradient></defs>
        <circle class="ring-track" cx="100" cy="100" r="85"></circle>
        <circle class="ring-prog" id="ringProg" cx="100" cy="100" r="85" stroke="${ring}"
          stroke-dasharray="${C}" stroke-dashoffset="${noSalary?C:offset}"></circle>
      </svg>
      <div class="ring-center">
        <div class="lbl">left to spend today</div>
        <div class="amt ${over?'over':''}"><span class="cur">${state.currency}</span><span id="heroNum">0</span></div>
        <div class="sub">${noSalary?'set up your salary to begin':'daily limit '+fmt(allowance>0?allowance:0)}</div>
      </div>
    </div>
  </div>

  ${noSalary? `<button class="log-btn" id="setSalaryHero">Set up salary</button>`
            : `<button class="log-btn" id="logBtn">+&nbsp; Log a payment</button>`}

  <div class="metrics">
    <div class="metric cash">
      <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><circle cx="12" cy="12.5" r="2.5"/></svg>Cash in hand</div>
      <div class="mv ${c.cashInHand<0?'neg':''}">${fmtShort(c.cashInHand)}</div>
      <div class="msub">income − paid − spent</div>
    </div>
    <div class="metric limit">
      <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Daily limit</div>
      <div class="mv">${noSalary?'—':fmtShort(c.dailyLimit)}</div>
      <div class="msub">for ${c.daysLeft} day${c.daysLeft!==1?'s':''} left</div>
    </div>
    <div class="metric days">
      <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>To payday</div>
      <div class="mv">${c.daysLeft}<small>day${c.daysLeft!==1?'s':''}</small></div>
      <div class="msub">salary ${payStr(c.c.next)}</div>
    </div>
  </div>

  <div class="stagger">
  <div class="card">
    <div class="card-head">
      <div class="ttl"><span class="chip gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span><h3>Income</h3></div>
      <span class="head-amt gold">${fmt(c.totalIncome)}</span>
    </div>
    <div class="rowi salary" id="salaryRow">
      <div class="meta"><div class="nm">Monthly salary<small>25th · Fri if weekend</small></div>
        <div class="amt">next payday ${payStr(c.c.next)}</div></div>
      <div class="val">${fmt(state.salary)}</div>
    </div>
    ${cycleIncomes.map(i=>`
      <div class="rowi">
        <div class="meta editable" data-editi="${i.id}"><div class="nm">${esc(i.name)} <span class="tag-in">+</span> <svg class="pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div>
          <div class="amt">added ${payStr(parseK(i.date))} · tap to edit</div></div>
        <div class="val tag-in">+${fmt(+i.amount)}</div>
        <button class="rm" data-rmi="${i.id}" aria-label="Remove">×</button>
      </div>`).join('')}
    <button class="add-line" id="addInc">+ Add extra income</button>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="ttl"><span class="chip coral"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span><h3>Fixed payments</h3></div>
      <span class="head-amt coral">${fmt(c.totalFixed)}</span>
    </div>
    ${state.payments.length? state.payments.map(p=>{
        const paid=+p.paid||0, alloc=+p.amount||0, rem=alloc-paid, full=alloc>0&&paid>=alloc;
        let prog;
        if(paid<=0) prog='not paid yet';
        else if(rem>0) prog='paid '+fmt(paid)+' · '+fmt(rem)+' left';
        else if(rem===0) prog='paid in full ✓';
        else prog='paid '+fmt(paid)+' · overpaid '+fmt(-rem);
        return `
      <div class="rowi ${full?'settled':''}">
        <div class="meta editable" data-editp="${p.id}"><div class="nm">${esc(p.name)} <svg class="pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div><div class="amt">${fmt(alloc)} / month · ${prog}</div></div>
        <button class="settle ${full?'done':''}" data-payfx="${p.id}">${full?'Pay more':'Pay'}</button>
        <button class="rm" data-rmp="${p.id}" aria-label="Remove">×</button>
      </div>`; }).join('')
      : `<div class="empty">Nothing fixed yet — add rent, loans or subscriptions.</div>`}
    ${state.payments.length?`<div class="amt" style="text-align:center;padding-top:11px;border-top:1px solid var(--line);margin-top:4px;color:var(--muted)">Paid ${fmt(c.paidFixed)} of ${fmt(c.totalFixed)}${c.overpaidFixed>0?' · overpaid '+fmt(c.overpaidFixed):''}</div>`:''}
    <button class="add-line" id="addPay">+ Add fixed payment</button>
  </div>

  ${todays.length? `
  <div class="card">
    <div class="card-head"><div class="ttl"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1 0-4h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg></span><h3>Today's spending</h3></div>
      <span class="head-amt">${fmt(c.spentToday)}</span></div>
    ${todays.map(e=>`<div class="rowi"><div class="meta"><div class="nm">${e.note?esc(e.note):'Payment'}</div>
      <div class="amt">${new Date(e.ts||Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></div>
      <div class="val">${fmt(+e.amount)}</div></div>`).join('')}
  </div>`:''}
  </div>`;
}

function groupsCard(c){
  const groups=groupSpend(c.cspend);
  const chip=`<span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg></span>`;
  if(!groups.length){
    return `<div class="card"><div class="card-head"><div class="ttl">${chip}<h3>Spending by payment</h3></div></div>
      <div class="empty" style="padding:6px 2px 14px">No daily payments yet this cycle. Log a few — repeats with the same name are grouped here so you can see totals like all your lunches together.</div></div>`;
  }
  const names=['all',...groups.map(g=>g.key)];
  const active=(grpFilter==='all'||groups.some(g=>g.key===grpFilter))?grpFilter:'all';
  const shown=active==='all'?groups:groups.filter(g=>g.key===active);
  const filterChips=`<div class="cur-pick gfilter">${names.map(k=>{
      const lbl=k==='all'?'All':(groups.find(g=>g.key===k)||{}).name;
      return `<button data-gf="${esc(k)}" class="${active===k?'sel':''}">${esc(lbl)}</button>`; }).join('')}</div>`;

  const rows=shown.map(g=>{
    const open=grpOpen[g.key];
    const dayRows=g.days.map(d=>`
      <div class="grp-day">
        <span class="gd-date">${parseK(d.date).toLocaleDateString(undefined,{day:'numeric',month:'short'})}</span>
        <span class="gd-qty">×${d.count}</span>
        <span class="gd-amt">${fmt(d.total)}</span>
      </div>`).join('');
    return `<div class="grp ${open?'open':''}">
      <button class="grp-head" data-grp="${esc(g.key)}">
        <span class="gh-name">${esc(g.name)}</span>
        <span class="gh-qty">×${g.count}</span>
        <span class="gh-amt">${fmt(g.total)}</span>
        <svg class="gh-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      ${open?`<div class="grp-body">
        <div class="grp-day grp-colhead"><span class="gd-date">Date</span><span class="gd-qty">Times</span><span class="gd-amt">Amount</span></div>
        ${dayRows}
      </div>`:''}
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-head"><div class="ttl">${chip}<h3>Spending by payment</h3></div>
      <span class="head-amt">${shown.reduce((s,g)=>s+g.total,0)?fmt(shown.reduce((s,g)=>s+g.total,0)):''}</span></div>
    <div class="empty" style="padding:0 2px 10px;font-size:11.5px">Tap a group to see each date and how many times you paid.</div>
    ${filterChips}
    <div class="grp-list">${rows}</div>
  </div>`;
}

function statsView(){
  if(!state.salary) return `<div class="card"><div class="empty" style="padding:42px 10px">Set up your salary on the Today tab,<br>then your spending appears here.</div></div>`;
  const c=compute(), len=c.cycleLen;
  const byDay=new Array(len).fill(0);
  c.cspend.forEach(e=>{ const o=between(c.c.prev,parseK(e.date)); if(o>=0&&o<len) byDay[o]+=(+e.amount||0); });
  const todayOff=between(c.c.prev,new Date());
  const maxV=Math.max(c.idealDaily,...byDay,1);
  const W=380,H=168,padB=4,padT=8,gap=len>22?2:3,bw=(W-(len-1)*gap)/len;
  const ih=H-padT-padB;
  const idealY=padT+ih*(1-c.idealDaily/maxV);
  let bars='';
  for(let i=0;i<len;i++){
    const x=i*(bw+gap), today=i===todayOff;
    const h=byDay[i]>0?Math.max(ih*(byDay[i]/maxV),3):0, y=padT+ih-h;
    if(h>0) bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="${Math.min(bw/2,3)}" fill="${today?'var(--gold)':'var(--mint)'}" opacity="${today?1:.8}"/>`;
    else bars+=`<rect x="${x.toFixed(1)}" y="${(padT+ih-2).toFixed(1)}" width="${bw.toFixed(1)}" height="2" rx="1" fill="rgba(255,255,255,.07)"/>`;
  }
  const over=c.remainingCycle<0, usedFrac=c.available>0?Math.min(c.spentCycle/c.available,1):(c.spentCycle>0?1:0);

  return `
  <div class="datestrip"><span class="dot"></span><span class="txt"></span></div>
  <div class="stagger">
  <div class="card">
    <div class="card-head"><div class="ttl"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M19 9l-5 5-4-4-3 3"/></svg></span><h3>Spent this cycle</h3></div>
      <span class="head-amt">${payStr(c.c.prev)}–${payStr(c.c.next)}</span></div>
    <div class="big-num" style="color:${over?'var(--coral)':'var(--text)'}">${fmt(c.spentCycle)}</div>
    <div class="progbar ${over?'over':''}"><i style="width:${(usedFrac*100).toFixed(1)}%"></i></div>
    <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:9px;font-family:var(--num)">
      <span>${(usedFrac*100).toFixed(0)}% of livable income</span>
      <span>${over?'over by '+fmt(-c.remainingCycle):fmt(c.remainingCycle)+' left'}</span></div>
  </div>

  <div class="card">

/* ---------- count-up ---------- */
function animateHero(){
  const c=compute(), target=state.salary?c.todaySpendable:0, el=document.getElementById('heroNum');
  if(!el) return;
  const from=lastBudget===null?0:lastBudget; lastBudget=target;
  const t0=performance.now();
  (function step(t){ const p=Math.min((t-t0)/650,1), e=1-Math.pow(1-p,3), v=from+(target-from)*e;
    el.textContent=Math.round(v).toLocaleString('en-US'); if(p<1) requestAnimationFrame(step); })(t0);
}

// detect a newly-started pay cycle and prompt for the new salary (old data is kept)
function checkPayday(){
  if(state.salary<=0) return;            // not set up yet — normal onboarding handles it
  if(paydayDismissed) return;            // user closed it this session
  const k=cycleKey();
  if(state.cycleAck && state.cycleAck!==k) openPayday(k);
}

function openPayday(newKey){
  const c=compute(), prevSalary=state.salary;
  openSheet(`
    <h2>New pay cycle 🎉</h2><p class="hint">It's a new month — payday has rolled over. Add this cycle's salary. Everything from your last cycle is kept.</p>
    <div class="payinfo">Cycle ${payStr(c.c.prev)} – ${payStr(c.c.next)}<br>Last cycle's salary was <b>${fmt(prevSalary)}</b>.</div>
    <div class="field"><label>This cycle's take-home salary</label>
      <div class="with-cur"><span class="pfx">${state.currency}</span>
      <input class="input" id="pdSal" inputmode="decimal" placeholder="0" value="${prevSalary||''}"></div></div>
    <label class="pdrow" id="pdResetWrap" style="display:flex;align-items:center;gap:10px;margin:4px 2px 10px;cursor:pointer;color:var(--muted)">
      <input type="checkbox" id="pdReset" style="width:18px;height:18px;accent-color:var(--mint)">
      <span>Start fixed payments fresh (set every bill's paid amount back to 0)</span></label>
    <button class="sheet-btn" id="pdSave">Confirm salary for this cycle</button>
    <button class="sheet-btn ghost" id="pdLater">Not now</button>`);
  sheet.querySelector('#pdLater').onclick=()=>{ paydayDismissed=true; closeSheet(); };
  sheet.querySelector('#pdSave').onclick=async()=>{
    const val=parseFloat(sheet.querySelector('#pdSal').value)||0;
    if(val<=0){ flash(sheet.querySelector('#pdSave'),'Enter this cycle\u2019s salary'); return; }
    // archive the salary that applied to the cycle just ended, then set the new one
    if(state.cycleAck) state.salaryByCycle[state.cycleAck]=prevSalary;
    state.salary=val; state.cycleAck=newKey; state.salaryByCycle[newKey]=val;
    if(sheet.querySelector('#pdReset').checked){ state.payments.forEach(p=>{ p.paid=0; p.settled=false; }); }
    paydayDismissed=true; lastBudget=null; await saveState(); closeSheet(); render();
  };
  setTimeout(()=>{ const f=sheet.querySelector('#pdSal'); if(f){ f.focus(); f.select&&f.select(); } },60);
}

function openSpend(mode, preId){
  mode = mode || 'normal';
  if(mode==='fixed' && !state.payments.length) mode='normal';
  openSheet(`
    <h2>Log a payment</h2><p class="hint">First choose the kind of payment you're making.</p>
    <div class="seg" id="payMode">
      <button data-m="normal" class="${mode==='normal'?'sel':''}">Normal payment</button>
      <button data-m="fixed" class="${mode==='fixed'?'sel':''}">Fixed payment</button>
    </div>
    <div id="payBody"></div>`);

  let curMode=mode, selId=preId||null;
  const body=sheet.querySelector('#payBody');

  function normalBody(){
    const sugg=suggestNames(8);
    body.innerHTML=`
      <div class="field"><label>Amount</label><div class="with-cur"><span class="pfx">${state.currency}</span>
        <input class="input" id="spAmt" inputmode="decimal" placeholder="0"></div></div>
      <div class="field"><label>What for? <span style="color:var(--muted-2)">(optional)</span></label>
        <input class="input" type="text" id="spNote" placeholder="Lunch, fuel, groceries…" autocomplete="off"></div>
      ${sugg.length?`<div class="field" style="margin-top:-4px"><label style="font-size:11px">Tap to reuse — keeps payments grouped</label>
        <div class="cur-pick" id="spSugg">${sugg.map(n=>`<button type="button" data-n="${esc(n)}">${esc(n)}</button>`).join('')}</div></div>`:''}
      <button class="sheet-btn" id="saveSp">Add to today</button>
      <button class="sheet-btn ghost" id="cancelSp">Cancel</button>`;
    const noteEl=body.querySelector('#spNote');
    body.querySelectorAll('#spSugg button').forEach(b=>b.onclick=()=>{
      noteEl.value=b.dataset.n;
      body.querySelectorAll('#spSugg button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
      const a=body.querySelector('#spAmt'); if(a&&!a.value) a.focus(); });
    body.querySelector('#cancelSp').onclick=closeSheet;
    body.querySelector('#saveSp').onclick=async()=>{
      const amt=parseFloat(body.querySelector('#spAmt').value)||0;
      if(amt<=0){flash(body.querySelector('#saveSp'),'Enter an amount');return;}
      state.spending.push({id:uid(),date:todayKey(),amount:amt,note:noteEl.value.trim(),ts:Date.now()});
      lastBudget=null; await saveState(); closeSheet(); render(); };
    setTimeout(()=>{const f=body.querySelector('#spAmt'); if(f) f.focus();},60);
  }

  function fixedBody(){
    if(!state.payments.length){
      body.innerHTML=`<div class="payinfo">You haven't added any fixed payments yet. Add one from the <b>Fixed payments</b> card first, then come back to pay it.</div>
        <button class="sheet-btn ghost" id="cancelSp">Close</button>`;
      body.querySelector('#cancelSp').onclick=closeSheet; return;
    }
    body.innerHTML=`
      <div class="field"><label>Which fixed payment are you paying?</label>
        <div class="cur-pick" id="fxPick">${state.payments.map(p=>`<button data-p="${p.id}" class="${selId===p.id?'sel':''}">${esc(p.name)}</button>`).join('')}</div></div>
      <div id="fxInfo"></div>`;
    const pick=body.querySelector('#fxPick');
    pick.querySelectorAll('button').forEach(b=>b.onclick=()=>{ selId=b.dataset.p;
      pick.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); paintFxInfo(); });
    paintFxInfo();
  }

  function paintFxInfo(){
    const info=body.querySelector('#fxInfo'); if(!info) return;
    const p=state.payments.find(x=>x.id===selId);
    if(!p){ info.innerHTML=`<div class="payinfo">Pick a fixed payment above to pay toward it.</div>`; return; }
    const paid=+p.paid||0, alloc=+p.amount||0, rem=alloc-paid;
    let line;
    if(rem>0) line=`Allocated <b>${fmt(alloc)}</b> · paid <b>${fmt(paid)}</b> · <b>${fmt(rem)}</b> still to pay`;
    else if(rem===0) line=`Allocated <b>${fmt(alloc)}</b> · <b>paid in full</b>`;
    else line=`Allocated <b>${fmt(alloc)}</b> · paid <b>${fmt(paid)}</b> · <b>overpaid by ${fmt(-rem)}</b>`;
    info.innerHTML=`
      <div class="payinfo"><b>${esc(p.name)}</b><br>${line}</div>
      <div class="field"><label>Amount you're paying now</label><div class="with-cur"><span class="pfx">${state.currency}</span>
        <input class="input" id="fxAmt" inputmode="decimal" placeholder="0" value="${rem>0?rem:''}"></div></div>
      <button class="sheet-btn" id="fxSave">Pay this</button>
      <button class="sheet-btn ghost" id="fxCancel">Cancel</button>`;
    info.querySelector('#fxCancel').onclick=closeSheet;
    info.querySelector('#fxSave').onclick=async()=>{
      const amt=parseFloat(info.querySelector('#fxAmt').value)||0;
      if(amt<=0){flash(info.querySelector('#fxSave'),'Enter an amount');return;}
      p.paid=(+p.paid||0)+amt;
      p.settled = alloc>0 && p.paid>=alloc;
      lastBudget=null; await saveState(); closeSheet(); render(); };
    setTimeout(()=>{const f=info.querySelector('#fxAmt'); if(f) f.focus();},60);
  }

  sheet.querySelectorAll('#payMode button').forEach(b=>b.onclick=()=>{
    curMode=b.dataset.m;
    sheet.querySelectorAll('#payMode button').forEach(x=>x.classList.toggle('sel',x.dataset.m===curMode));
    if(curMode==='normal') normalBody(); else fixedBody();
  });

  if(curMode==='normal') normalBody(); else fixedBody();
}

/* ---------- payments summary: PNG / PDF, fully offline ---------- */
const SANS="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif";
const SERIF="Georgia,'Times New Roman',serif";
function drawSummary(ctx,W,measure){
  const P={card:'#221B30',line:'rgba(255,255,255,0.09)',text:'#F5F2F8',muted:'#A39AB4',mint:'#67E8C3',gold:'#F3C98B',coral:'#FF7E6E'};
  const c=compute(), now=new Date(), paint=!measure, pad=34, innerW=W-pad*2;
  let y=0;
  if(paint){ ctx.textBaseline='alphabetic'; ctx.textAlign='left'; }
  const rrect=(x,yy,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,yy);ctx.arcTo(x+w,yy,x+w,yy+h,r);ctx.arcTo(x+w,yy+h,x,yy+h,r);ctx.arcTo(x,yy+h,x,yy,r);ctx.arcTo(x,yy,x+w,yy,r);ctx.closePath();};
  const trunc=(t,maxW,f)=>{ctx.font=f;if(ctx.measureText(t).width<=maxW)return t;let s=t;while(s.length>1&&ctx.measureText(s+'…').width>maxW)s=s.slice(0,-1);return s+'…';};
  const hr=()=>{ if(paint){ctx.strokeStyle=P.line;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();} };

  y=pad+26;
  if(paint){ ctx.fillStyle=P.text; ctx.font='italic 600 30px '+SERIF; ctx.fillText('spendable',pad,y);
    ctx.fillStyle=P.muted; ctx.font='500 14px '+SANS; ctx.textAlign='right'; ctx.fillText('Account statement',W-pad,y-6); ctx.textAlign='left'; }
  y+=18; hr(); y+=24;
  if(paint){ ctx.fillStyle=P.muted; ctx.font='400 13px '+SANS;
    ctx.fillText('Generated '+now.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'long',year:'numeric'})+' · '+now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),pad,y);
    ctx.fillText('Pay cycle '+payStr(c.c.prev)+' – '+payStr(c.c.next)+'  ·  '+c.daysLeft+' day'+(c.daysLeft!==1?'s':'')+' to payday',pad,y+20); }
  y+=46;

  const tiles=[
    ['Monthly salary',fmt(state.salary),P.gold],['Extra income',fmt(c.extra),P.mint],
    ['Total income',fmt(c.totalIncome),P.text],['Fixed payments',fmt(c.totalFixed),P.coral],
    ['Cash in hand',fmt(c.cashInHand),c.cashInHand<0?P.coral:P.gold],['Daily limit',fmt(c.dailyLimit),P.mint],
    ['Spent this cycle',fmt(c.spentCycle),P.text],['Left to live on',fmt(c.remainingCycle),c.remainingCycle<0?P.coral:P.mint]];
  const tgap=12, tw=(innerW-tgap)/2, th=58;
  for(let i=0;i<tiles.length;i++){ const col=i%2,row=(i-col)/2,tx=pad+col*(tw+tgap),tiy=y+row*(th+tgap);
    if(paint){ ctx.fillStyle=P.card; rrect(tx,tiy,tw,th,12); ctx.fill();
      ctx.fillStyle=P.muted; ctx.font='600 10px '+SANS; ctx.fillText(tiles[i][0].toUpperCase(),tx+14,tiy+22);
      ctx.fillStyle=tiles[i][2]; ctx.font='600 20px '+SANS; ctx.fillText(tiles[i][1],tx+14,tiy+45); } }
  y+=Math.ceil(tiles.length/2)*(th+tgap)+18;

  const section=(label,right)=>{ if(paint){ ctx.fillStyle=P.text; ctx.font='600 15px '+SANS; ctx.fillText(label,pad,y);
      if(right){ ctx.fillStyle=P.muted; ctx.font='600 13px '+SANS; ctx.textAlign='right'; ctx.fillText(right,W-pad,y); ctx.textAlign='left'; } }
    y+=12; hr(); y+=24; };
  const rowH=33;

  section('Income','Total '+fmt(c.totalIncome));
  if(paint){ ctx.fillStyle=P.text; ctx.font='500 14px '+SANS; ctx.fillText('Monthly salary',pad,y);
    ctx.textAlign='right'; ctx.fillStyle=P.gold; ctx.font='600 14px '+SANS; ctx.fillText(fmt(state.salary),W-pad,y); ctx.textAlign='left'; }
  y+=rowH;
  const cinc=state.incomes.filter(i=>inCycle(i.date,c.c));
  for(const i of cinc){ if(paint){ ctx.fillStyle=P.text; ctx.font='500 14px '+SANS; ctx.fillText(trunc(i.name,innerW-160,'500 14px '+SANS),pad,y);
      ctx.textAlign='right'; ctx.fillStyle=P.mint; ctx.font='600 14px '+SANS; ctx.fillText('+ '+fmt(+i.amount),W-pad,y); ctx.textAlign='left'; } y+=rowH; }
  y+=8;

  section('Fixed payments','Total '+fmt(c.totalFixed));
  if(state.payments.length){ for(const p of state.payments){ if(paint){
      const _paid=+p.paid||0, _alloc=+p.amount||0, _full=_alloc>0&&_paid>=_alloc, _part=_paid>0&&!_full;
      const _label=_full?'PAID':(_part?'PARTIAL':'PENDING'), _col=_full?P.mint:(_part?P.gold:P.coral);
      const _amtStr=fmt(_paid)+' / '+fmt(_alloc);
      // measure widths first so nothing overlaps regardless of amount length
      ctx.font='600 14px '+SANS; const _amtW=ctx.measureText(_amtStr).width;
      ctx.font='600 11px '+SANS; const _labW=ctx.measureText(_label).width;
      const _labelRightX=W-pad-_amtW-18;          // right edge of the status label
      const _nameMax=Math.max((_labelRightX-_labW-16)-pad,40);
      // name (left)
      ctx.textAlign='left'; ctx.fillStyle=_full?P.muted:P.text; ctx.font='500 14px '+SANS;
      ctx.fillText(trunc(p.name,_nameMax,'500 14px '+SANS),pad,y);
      // status label (right-aligned, just left of the amount)
      ctx.textAlign='right'; ctx.fillStyle=_col; ctx.font='600 11px '+SANS; ctx.fillText(_label,_labelRightX,y);
      // amount paid / allocated (right edge)
      ctx.fillStyle=_full?P.muted:P.text; ctx.font='600 14px '+SANS; ctx.fillText(_amtStr,W-pad,y);
      ctx.textAlign='left'; } y+=rowH; }
    if(paint){ ctx.fillStyle=P.muted; ctx.font='500 13px '+SANS; ctx.fillText('Paid '+fmt(c.paidFixed)+'  ·  Pending '+fmt(c.pendingFixed)+(c.overpaidFixed>0?'  ·  Overpaid '+fmt(c.overpaidFixed):''),pad,y+2); } y+=26;
  } else { if(paint){ ctx.fillStyle=P.muted; ctx.font='400 13px '+SANS; ctx.fillText('No fixed payments added.',pad,y); } y+=rowH; }
  y+=8;

  section('Spending this cycle','');
  const sp=[['Spent so far',fmt(c.spentCycle)],['Spent today',fmt(c.spentToday)],
    ['Average per day',fmt((c.cycleLen-c.daysLeft+1)>0?c.spentCycle/(c.cycleLen-c.daysLeft+1):0)],['Ideal daily pace',fmt(c.idealDaily)]];
  for(const r of sp){ if(paint){ ctx.fillStyle=P.muted; ctx.font='400 14px '+SANS; ctx.fillText(r[0],pad,y);
      ctx.textAlign='right'; ctx.fillStyle=P.text; ctx.font='600 14px '+SANS; ctx.fillText(r[1],W-pad,y); ctx.textAlign='left'; } y+=rowH; }
  y+=14;

  /* ---- dated transaction statement: every income + daily payment in date order ---- */
  section('Transaction statement','This cycle');
  // build ledger entries from incomes and daily spending that fall inside this cycle
  const ledger=[];
  state.incomes.filter(i=>inCycle(i.date,c.c)).forEach(i=>ledger.push({ts:(i.ts||parseK(i.date).getTime()),date:i.date,desc:i.name||'Income',type:'in',amount:+i.amount||0}));
  c.cspend.forEach(e=>ledger.push({ts:(e.ts||parseK(e.date).getTime()),date:e.date,desc:e.note||'Payment',type:'out',amount:+e.amount||0}));
  ledger.sort((a,b)=>a.ts-b.ts);

  // column geometry
  const cDate=pad, cAmt=W-pad, cBal=W-pad, wAmt=120, wBal=120;
  const cDesc=pad+96, descMax=innerW-96-wAmt-wBal-24;
  // header row
  if(paint){ ctx.fillStyle=P.muted; ctx.font='600 10px '+SANS;
    ctx.fillText('DATE',cDate,y);
    ctx.fillText('DESCRIPTION',cDesc,y);
    ctx.textAlign='right'; ctx.fillText('AMOUNT',cAmt-wBal-24,y); ctx.fillText('BALANCE',cBal,y); ctx.textAlign='left'; }
  y+=10; hr(); y+=22;

  if(ledger.length){
    let bal=state.salary; // opening balance = salary credited at payday
    if(paint){ // opening line
      ctx.fillStyle=P.muted; ctx.font='500 13px '+SANS; ctx.fillText(payStr(c.c.prev),cDate,y);
      ctx.fillStyle=P.text; ctx.font='italic 500 13px '+SERIF; ctx.fillText('Opening · monthly salary',cDesc,y);
      ctx.textAlign='right'; ctx.fillStyle=P.gold; ctx.font='600 13px '+SANS; ctx.fillText('+ '+fmt(state.salary),cAmt-wBal-24,y);
      ctx.fillStyle=P.text; ctx.fillText(fmt(bal),cBal,y); ctx.textAlign='left'; }
    y+=rowH;
    let lastDate=null;
    for(const t of ledger){
      bal += t.type==='in'? t.amount : -t.amount;
      if(paint){
        const showDate = t.date!==lastDate;
        ctx.fillStyle=P.muted; ctx.font='500 13px '+SANS;
        if(showDate) ctx.fillText(payStr(parseK(t.date)),cDate,y);
        ctx.fillStyle=P.text; ctx.font='500 14px '+SANS; ctx.fillText(trunc(t.desc,descMax,'500 14px '+SANS),cDesc,y);
        ctx.textAlign='right';
        ctx.fillStyle=t.type==='in'?P.mint:P.coral; ctx.font='600 14px '+SANS;
        ctx.fillText((t.type==='in'?'+ ':'− ')+fmt(t.amount),cAmt-wBal-24,y);
        ctx.fillStyle=bal<0?P.coral:P.text; ctx.font='600 14px '+SANS; ctx.fillText(fmt(bal),cBal,y);
        ctx.textAlign='left';
      }
      lastDate=t.date; y+=rowH;
    }
    if(paint){ y+=2; hr(); y+=20;
      ctx.fillStyle=P.muted; ctx.font='600 13px '+SANS; ctx.fillText('Closing balance (excl. fixed bills)',cDesc,y);
      ctx.textAlign='right'; ctx.fillStyle=bal<0?P.coral:P.gold; ctx.font='700 14px '+SANS; ctx.fillText(fmt(bal),cBal,y); ctx.textAlign='left'; }
    y+=rowH;
  } else {
    if(paint){ ctx.fillStyle=P.muted; ctx.font='400 13px '+SANS; ctx.fillText('No incomes or daily payments logged this cycle yet.',pad,y); } y+=rowH;
  }
  y+=12; hr(); y+=22;
  if(paint){ ctx.fillStyle=P.muted; ctx.font='400 12px '+SANS; ctx.fillText('spendable · all amounts in '+state.currency+' · salary on the 25th (Friday if weekend)',pad,y); }
  y+=pad;
  return y;
}
function makeSummaryCanvas(){
  const W=800, DPR=2, m=document.createElement('canvas').getContext('2d');
  const H=Math.ceil(drawSummary(m,W,true));
  const cv=document.createElement('canvas'); cv.width=W*DPR; cv.height=H*DPR;
  const ctx=cv.getContext('2d'); ctx.scale(DPR,DPR);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#1A1525'); g.addColorStop(1,'#13101B');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#67E8C3'; ctx.fillRect(0,0,W,4);
  drawSummary(ctx,W,false);
  return cv;
}
function downloadBlob(blob,name){ const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},2000); }
function u8(s){ const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i)&255; return a; }
function buildPdf(jpeg,imgW,imgH){
  const chunks=[]; let pos=0; const offs=[];
  const add=d=>{ const a=(typeof d==='string')?u8(d):d; chunks.push(a); pos+=a.length; };
  const pageW=595.28,pageH=841.89,margin=28,maxW=pageW-margin*2,maxH=pageH-margin*2;
  const scale=Math.min(maxW/imgW,maxH/imgH),dw=imgW*scale,dh=imgH*scale,x=(pageW-dw)/2,ty=pageH-margin-dh;
  add('%PDF-1.3\n'); add(new Uint8Array([0x25,0xE2,0xE3,0xCF,0xD3,0x0A]));
  const obj=(n,head,stream)=>{ offs[n]=pos; add(n+' 0 obj\n'+head); if(stream){ add('\nstream\n'); add(stream); add('\nendstream'); } add('\nendobj\n'); };
  obj(1,'<< /Type /Catalog /Pages 2 0 R >>');
  obj(2,'<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  obj(3,'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+pageW+' '+pageH+'] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>');
  const content='q\n'+dw.toFixed(2)+' 0 0 '+dh.toFixed(2)+' '+x.toFixed(2)+' '+ty.toFixed(2)+' cm\n/Im0 Do\nQ';
  obj(4,'<< /Length '+content.length+' >>',u8(content));
  obj(5,'<< /Type /XObject /Subtype /Image /Width '+imgW+' /Height '+imgH+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+jpeg.length+' >>',jpeg);
  const xrefPos=pos,count=6; let xref='xref\n0 '+count+'\n0000000000 65535 f \n';
  for(let i=1;i<count;i++) xref+=String(offs[i]).padStart(10,'0')+' 00000 n \n';
  add(xref); add('trailer\n<< /Size '+count+' /Root 1 0 R >>\nstartxref\n'+xrefPos+'\n%%EOF');
  let total=0; chunks.forEach(c=>total+=c.length); const out=new Uint8Array(total); let o=0; chunks.forEach(c=>{out.set(c,o);o+=c.length;});
  return new Blob([out],{type:'application/pdf'});
}
function exportSummary(kind){
  if(!state.salary){ alert('Add your salary first, then you can save a summary.'); return; }
  try{
    const cv=makeSummaryCanvas(), stamp=new Date().toISOString().slice(0,10);
    if(kind==='png'){ cv.toBlob(b=>{ if(b) downloadBlob(b,'spendable-summary-'+stamp+'.png'); }, 'image/png'); }
    else { cv.toBlob(async b=>{ try{ const buf=new Uint8Array(await b.arrayBuffer());
      downloadBlob(buildPdf(buf,cv.width,cv.height),'spendable-summary-'+stamp+'.pdf'); }catch(e){ alert('PDF error: '+e.message); } }, 'image/jpeg', 0.92); }
  }catch(e){ alert('Could not create summary: '+e.message); }
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });

function detectBrowser(){
  const ua=navigator.userAgent;
  const iOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  const criOS=/CriOS/.test(ua),fxiOS=/FxiOS/.test(ua),edgiOS=/EdgiOS/.test(ua),android=/Android/.test(ua);
  return {iOS,android,iosNonSafari:iOS&&(criOS||fxiOS||edgiOS)};
}
function openInstall(){
  const b=detectBrowser();
  const safariSteps=`<ol class="steps">
    <li>Open this page in <b>Safari</b>${b.iosNonSafari?" — not the browser you're in now":''}.</li>
    <li>Tap the <b>Share</b> button at the bottom of the screen.</li>
    <li>Scroll down and tap <b>Add to Home Screen</b>.</li>
    <li>Tap <b>Add</b> — Spendable now opens full-screen like an app.</li></ol>`;
  const chromeSteps=`<ol class="steps">
    <li>Tap the <b>⋮</b> menu in the top-right of Chrome.</li>
    <li>Tap <b>Add to Home screen</b> (or <b>Install app</b>).</li>
    <li>Tap <b>Add</b> / <b>Install</b> to confirm.</li>
    <li>Launch it from the new home-screen icon.</li></ol>`;
  openSheet(`
    <h2>Add to Home Screen</h2><p class="hint">Pin Spendable to your phone and open it like any other app.</p>
    ${deferredPrompt?`<button class="sheet-btn" id="oneTap">Install now</button><div style="height:14px"></div>`:''}
    <div class="gtab" id="gtab">
      <button data-g="safari"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16.2 7.8l-2.9 6.4-6.4 2.9 2.9-6.4z"/></svg>Safari</button>
      <button data-g="chrome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 8h9.5M5.5 6.5l4.2 6.6M14.3 19.6l-2.5-7"/></svg>Chrome</button>
    </div>
    <div id="gbody"></div>
    <div class="gnote"><b>Tip:</b> on iPhone, only <b>Safari</b> can add to the home screen. For an app that always keeps your data, open Spendable from a web address (https) rather than a saved file — on iPhone, files opened directly don't always retain their data in app mode.</div>
    <button class="sheet-btn ghost" id="instClose">Done</button>`);
  const body=sheet.querySelector('#gbody');
  const paint=g=>{ body.innerHTML=g==='chrome'?chromeSteps:safariSteps;
    sheet.querySelectorAll('#gtab button').forEach(x=>x.classList.toggle('sel',x.dataset.g===g)); };
  sheet.querySelectorAll('#gtab button').forEach(x=>x.onclick=()=>paint(x.dataset.g));
  paint(b.android?'chrome':'safari');
  sheet.querySelector('#instClose').onclick=closeSheet;
  if(deferredPrompt) sheet.querySelector('#oneTap').onclick=async()=>{ deferredPrompt.prompt(); try{await deferredPrompt.userChoice;}catch(e){} deferredPrompt=null; closeSheet(); };
}
